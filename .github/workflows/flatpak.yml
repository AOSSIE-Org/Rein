name: Flatpak Distribution

on:
  workflow_dispatch:
  push:
    tags:
      - 'v*.*.*'
  pull_request:
    paths:
      - 'flatpak/**'
      - '.github/workflows/flatpak.yml'

jobs:
  flatpak:
    runs-on: ubuntu-latest
    container:
      image: bilelmoussaoui/flatpak-github-actions:freedesktop-23.08
      options: --privileged

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: "npm"

      - name: Install dependencies
        run: npm install --include=optional --force

      - name: Rebuild native dependencies
        run: npx electron-builder install-app-deps

      - name: Build frontend
        run: npm run build

      - name: Package Linux AppImage
        run: npm run dist -- --linux AppImage --publish=never
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Locate AppImage
        id: appimage
        run: |
          APPIMAGE=$(ls dist/*.AppImage | head -1)
          echo "path=$APPIMAGE" >> "$GITHUB_OUTPUT"
          cp "$APPIMAGE" flatpak/rein-placeholder.AppImage

      - name: Build Flatpak
        uses: flatpak/flatpak-github-actions/flatpak-builder@v6
        with:
          bundle: rein.flatpak
          manifest-path: flatpak/org.aossie.Rein.yml
          cache-key: flatpak-builder-${{ github.sha }}

      - name: Upload Flatpak bundle
        uses: actions/upload-artifact@v4
        with:
          name: rein-flatpak
          path: rein.flatpak
          retention-days: 30

      - name: Publish to GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: rein.flatpak
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
